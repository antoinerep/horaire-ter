name: Daily summary

on:
  schedule:
    # 04:00 UTC = 06:00 Paris. Runs once daily on the last 24h of data.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python analyze.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATS.md
          if git diff --cached --quiet; then
            echo "No change."
            exit 0
          fi
          git commit -m "stats: daily summary $(date -u +%F)"
          git push
