name: Daily summary

on:
  schedule:
    # 04:23 UTC ≈ 06:23 Paris. Off-the-hour scheduling avoids GitHub Actions
    # skipping our run during the top-of-hour congestion peak.
    - cron: "23 4 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [analyze]

permissions:
  contents: write

concurrency:
  # Shared with collect.yml so they serialize when they fire together.
  group: write-main
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: python analyze.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATS.md DETAIL.md
          if git diff --cached --quiet; then
            echo "No change."
            exit 0
          fi
          git commit -m "stats: daily summary $(date -u +%F)"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i rejected, rebasing on origin/main and retrying..."
            git pull --rebase --autostash origin main
            sleep "$i"
          done
          echo "Push still failing after 5 attempts." >&2
          exit 1
