name: Collect Lyon ↔ Le Puy delays

on:
  schedule:
    # Every 2 hours, 17 minutes past the hour. Off-the-hour scheduling avoids
    # GitHub Actions skipping our runs during the top-of-hour congestion peak.
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Capture full current day (true/false)"
        required: false
        default: "false"
  # External trigger fallback (cron-job.org), since GitHub Actions schedules
  # are best-effort and frequently skipped under load.
  repository_dispatch:
    types: [collect]

permissions:
  contents: write

concurrency:
  # Shared with analyze.yml so they serialize when they fire together
  # (otherwise both push to main and one gets rejected).
  group: write-main
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Collect
        env:
          SNCF_API_KEY: ${{ secrets.SNCF_API_KEY }}
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python collect.py --backfill
          else
            python collect.py
          fi

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data."
            exit 0
          fi
          git commit -m "data: collect $(date -u +%FT%H:%MZ)"
          # Concurrency should already prevent simultaneous pushes, but if a
          # manual run lands at the same time as a cron run we still retry on
          # rejection.
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i rejected, rebasing on origin/main and retrying..."
            git pull --rebase --autostash origin main
            sleep "$i"
          done
          echo "Push still failing after 5 attempts." >&2
          exit 1

      - name: Heartbeat OK (healthchecks.io)
        if: success() && env.HEALTHCHECKS_URL != ''
        env:
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
        run: curl -fsS -m 10 --retry 3 "$HEALTHCHECKS_URL"

      - name: Heartbeat FAIL (healthchecks.io)
        if: failure() && env.HEALTHCHECKS_URL != ''
        env:
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
        run: curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_URL}/fail"
